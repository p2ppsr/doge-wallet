name: Deployment

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: doge-wallet-cars-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    env:
      CARS_REQUEST_TIMEOUT_MS: "300000"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test frontend
        run: npm test -- --run
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Install CARS globally
        run: npm i -g @p2ppsr/cars-cli@latest

      - name: Build CARS artifact
        run: cars build Babbage

      - name: Check CARS transport and balance
        env:
          CARS_PRIVATE_KEY: ${{ secrets.CARS_PRIVATE_KEY }}
          CARS_WALLET_STORAGE: ${{ secrets.CARS_WALLET_STORAGE }}
        run: |
          set -euo pipefail
          if [ -z "${CARS_PRIVATE_KEY:-}" ]; then
            echo "CARS_PRIVATE_KEY repository secret is required." >&2
            exit 1
          fi
          storage_args=()
          if [ -n "${CARS_WALLET_STORAGE:-}" ]; then
            storage_args=(--storage "$CARS_WALLET_STORAGE")
          fi
          cars doctor Babbage \
            --key "$CARS_PRIVATE_KEY" \
            --network mainnet \
            "${storage_args[@]}"
          cars project ensure-balance Babbage \
            --key "$CARS_PRIVATE_KEY" \
            --network mainnet \
            "${storage_args[@]}" \
            --min 1 \
            --topup-to 250000

      - name: Release CARS artifact
        env:
          CARS_PRIVATE_KEY: ${{ secrets.CARS_PRIVATE_KEY }}
          CARS_WALLET_STORAGE: ${{ secrets.CARS_WALLET_STORAGE }}
        run: |
          set -euo pipefail
          if [ -z "${CARS_PRIVATE_KEY:-}" ]; then
            echo "CARS_PRIVATE_KEY repository secret is required." >&2
            exit 1
          fi
          storage_args=()
          if [ -n "${CARS_WALLET_STORAGE:-}" ]; then
            storage_args=(--storage "$CARS_WALLET_STORAGE")
          fi
          for attempt in 1 2 3; do
            log_file="cars-release-attempt-${attempt}.log"
            set +e
            cars release now Babbage \
              --key "$CARS_PRIVATE_KEY" \
              --network mainnet \
              "${storage_args[@]}" 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -eq 0 ] && grep -q "CARS_RELEASE_SUCCESS" "$log_file"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              if [ "$status" -eq 0 ]; then
                echo "cars release exited successfully but did not emit CARS_RELEASE_SUCCESS." >&2
                exit 1
              fi
              exit "$status"
            fi
            sleep "$((attempt * 20))"
          done

